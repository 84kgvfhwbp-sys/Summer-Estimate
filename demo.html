<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#0f5a35"><title>Summer Estimate Demo</title><style>:root {
  --forest-950: #073d25;
  --forest-900: #0b4a2c;
  --forest-800: #0f5a35;
  --forest-700: #176b40;
  --green-600: #2f8e4d;
  --green-500: #49a85f;
  --green-100: #e9f5eb;
  --lime: #dff12f;
  --ink: #142119;
  --muted: #6c786f;
  --soft: #f4f7f3;
  --paper: #ffffff;
  --line: #dde5de;
  --line-strong: #cbd7cd;
  --danger: #aa3c39;
  --warning: #8a6813;
  --shadow-sm: 0 5px 16px rgba(16, 56, 34, .07);
  --shadow-md: 0 16px 40px rgba(16, 56, 34, .12);
  --radius-sm: 12px;
  --radius: 18px;
  --radius-lg: 24px;
  --content-width: 760px;
  color-scheme: light;
}

* { box-sizing: border-box; }

html {
  min-height: 100%;
  background: #edf2ed;
  -webkit-text-size-adjust: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  margin: 0;
  overflow-x: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 100% 0%, rgba(73, 168, 95, .14), transparent 27rem),
    linear-gradient(180deg, #edf2ed 0%, #f7f9f6 38%, #f4f6f2 100%);
  font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  line-height: 1.45;
}

button, input, select { font: inherit; }
button { cursor: pointer; }
button, input, select { -webkit-tap-highlight-color: transparent; }
button:focus-visible, input:focus-visible, select:focus-visible {
  outline: 3px solid rgba(73, 168, 95, .25);
  outline-offset: 2px;
}

.app-shell { min-height: 100vh; }

.desktop-sidebar { display: none; }

.mobile-header {
  position: sticky;
  top: 0;
  z-index: 50;
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) 44px;
  align-items: center;
  min-height: 68px;
  padding: max(10px, env(safe-area-inset-top)) 14px 10px;
  color: #fff;
  background: linear-gradient(135deg, var(--forest-900), var(--forest-700));
  box-shadow: 0 10px 24px rgba(5, 49, 28, .18);
}

.header-title { min-width: 0; text-align: center; }
.header-title strong {
  display: block;
  overflow: hidden;
  font-size: 19px;
  font-weight: 780;
  letter-spacing: -.02em;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-title small {
  display: block;
  margin-top: 1px;
  color: rgba(255,255,255,.72);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.icon-btn {
  display: inline-grid;
  width: 42px;
  height: 42px;
  padding: 0;
  place-items: center;
  color: inherit;
  background: transparent;
  border: 0;
  border-radius: 13px;
}
.icon-btn:active { background: rgba(255,255,255,.12); }
.icon-btn svg { width: 23px; height: 23px; }

.app-main {
  width: min(100%, var(--content-width));
  margin: 0 auto;
  padding: 18px 14px calc(180px + env(safe-area-inset-bottom));
}

.page-title { margin: 2px 2px 18px; }
.page-title h1 {
  margin: 0;
  font-size: clamp(27px, 7vw, 36px);
  line-height: 1.1;
  letter-spacing: -.045em;
}
.page-title p { margin: 8px 0 0; color: var(--muted); }

.hero-card {
  position: relative;
  overflow: hidden;
  margin-bottom: 18px;
  padding: 24px;
  color: #fff;
  background: linear-gradient(135deg, var(--forest-900) 0%, var(--forest-700) 62%, #2d8a4a 100%);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
}
.hero-card::after {
  position: absolute;
  right: -56px;
  bottom: -76px;
  width: 190px;
  height: 190px;
  content: "";
  background: rgba(223,241,47,.16);
  border-radius: 50%;
}
.hero-eyebrow {
  position: relative;
  z-index: 1;
  color: rgba(255,255,255,.72);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.hero-total {
  position: relative;
  z-index: 1;
  margin: 6px 0 4px;
  font-size: clamp(36px, 10vw, 52px);
  font-weight: 850;
  letter-spacing: -.055em;
}
.hero-sub { position: relative; z-index: 1; color: rgba(255,255,255,.78); }

.primary-btn, .secondary-btn, .text-btn, .danger-btn {
  min-height: 48px;
  padding: 12px 17px;
  border-radius: 14px;
  font-weight: 780;
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.primary-btn:active, .secondary-btn:active, .text-btn:active, .danger-btn:active { transform: scale(.985); }
.primary-btn {
  color: white;
  background: linear-gradient(180deg, var(--green-600), var(--forest-700));
  border: 1px solid rgba(0,0,0,.03);
  box-shadow: 0 8px 18px rgba(15,90,53,.18);
}
.secondary-btn {
  color: var(--forest-800);
  background: #fff;
  border: 1px solid var(--line);
}
.text-btn {
  min-height: 40px;
  padding: 8px 10px;
  color: var(--forest-700);
  background: transparent;
  border: 0;
}
.danger-btn {
  color: var(--danger);
  background: #fff;
  border: 1px solid #e6c8c6;
}
.full-btn { width: 100%; }
.button-row { display: flex; gap: 10px; }
.button-row > * { flex: 1; }

.card {
  margin-bottom: 14px;
  background: rgba(255,255,255,.98);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.card-pad { padding: 18px; }

.section-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 22px 2px 11px;
}
.section-heading h2 { margin: 0; font-size: 18px; letter-spacing: -.02em; }
.section-heading small { color: var(--muted); }

.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap svg {
  position: absolute;
  top: 50%;
  left: 15px;
  width: 20px;
  height: 20px;
  color: var(--muted);
  transform: translateY(-50%);
  pointer-events: none;
}
.search-wrap input { padding-left: 46px; }

input, select {
  width: 100%;
  min-height: 50px;
  padding: 12px 14px;
  color: var(--ink);
  background: #fbfcfa;
  border: 1.5px solid var(--line-strong);
  border-radius: 13px;
}
input[type="number"] { font-variant-numeric: tabular-nums; }
input::placeholder { color: #a0aaa2; }
input:focus, select:focus {
  background: #fff;
  border-color: var(--green-500);
  outline: 0;
  box-shadow: 0 0 0 4px rgba(73,168,95,.12);
}

.field { display: grid; gap: 7px; margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  color: #526057;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .055em;
  text-transform: uppercase;
}
.field-help { margin-top: -5px; color: var(--muted); font-size: 12px; }
.field-grid { display: grid; gap: 12px; }
.field-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

.estimate-list { display: grid; gap: 10px; }
.estimate-card {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 14px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(16,56,34,.05);
}
.file-icon {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  color: var(--forest-700);
  background: var(--green-100);
  border-radius: 12px;
}
.file-icon svg { width: 21px; height: 21px; }
.estimate-card h3 {
  overflow: hidden;
  margin: 0;
  font-size: 15px;
  letter-spacing: -.015em;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.estimate-card p {
  overflow: hidden;
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 12px;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.estimate-amount { text-align: right; }
.estimate-amount strong { display: block; color: var(--forest-800); font-size: 15px; }
.estimate-amount small { color: var(--muted); font-size: 11px; }
.estimate-actions {
  grid-column: 2 / -1;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 2px;
}
.mini-btn {
  min-height: 36px;
  padding: 7px 11px;
  color: var(--forest-700);
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 12px;
  font-weight: 750;
}
.mini-btn.delete { color: var(--danger); }

.project-card { padding: 18px; }
.project-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.project-card-top h2 { margin: 0; font-size: 17px; }
.project-name { margin: 0 0 6px; font-size: 21px; font-weight: 820; letter-spacing: -.03em; }
.project-address { margin: 0 0 14px; color: var(--muted); }
.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.meta-label { display: block; color: var(--muted); font-size: 11px; font-weight: 750; text-transform: uppercase; }
.meta-value { display: block; margin-top: 3px; font-size: 14px; font-weight: 750; }

.service-list { display: grid; gap: 9px; }
.service-row {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr) auto 18px;
  gap: 11px;
  align-items: center;
  width: 100%;
  min-height: 76px;
  padding: 12px 14px;
  color: inherit;
  text-align: left;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 4px 12px rgba(16,56,34,.05);
}
.service-number {
  display: grid;
  width: 36px;
  height: 36px;
  place-items: center;
  color: #fff;
  background: var(--green-600);
  border-radius: 50%;
  font-size: 14px;
  font-weight: 850;
}
.service-row:nth-child(2) .service-number { background: #4f95b9; }
.service-row:nth-child(3) .service-number { background: #8975bd; }
.service-row:nth-child(4) .service-number { background: #d28620; }
.service-row:nth-child(5) .service-number { background: #d45f67; }
.service-copy strong { display: block; font-size: 15px; }
.service-copy small { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
.service-money { text-align: right; }
.service-money strong { display: block; color: var(--forest-800); font-size: 15px; }
.service-money small { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; }
.chevron { color: #98a29a; }
.chevron svg { width: 18px; height: 18px; }

.section-total-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 17px 18px;
  color: #fff;
  background: linear-gradient(135deg, var(--forest-800), var(--forest-700));
  border-radius: 18px;
  box-shadow: var(--shadow-sm);
}
.section-total-card span { color: rgba(255,255,255,.72); font-size: 12px; font-weight: 800; text-transform: uppercase; }
.section-total-card strong { font-size: 23px; letter-spacing: -.03em; }

.form-card { padding: 18px; }
.form-card + .form-card { margin-top: 12px; }
.form-card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.form-card-title h2, .form-card-title h3 { margin: 0; font-size: 18px; }
.form-card-title p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  min-height: 52px;
}
.toggle-row + .toggle-row { border-top: 1px solid var(--line); }
.toggle-copy strong { display: block; }
.toggle-copy small { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }
.switch { position: relative; flex: 0 0 auto; width: 52px; height: 31px; }
.switch input { position: absolute; opacity: 0; pointer-events: none; }
.switch span {
  position: absolute;
  inset: 0;
  background: #d4dcd5;
  border-radius: 999px;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.05);
  transition: .18s ease;
}
.switch span::after {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 25px;
  height: 25px;
  content: "";
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,.22);
  transition: .18s ease;
}
.switch input:checked + span { background: var(--green-600); }
.switch input:checked + span::after { transform: translateX(21px); }

.segmented {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  padding: 4px;
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: 14px;
}
.segmented button {
  min-height: 42px;
  color: var(--muted);
  background: transparent;
  border: 0;
  border-radius: 10px;
  font-weight: 750;
}
.segmented button.active { color: #fff; background: var(--forest-700); box-shadow: 0 5px 12px rgba(15,90,53,.16); }

.subservice {
  margin-top: 14px;
  padding: 15px;
  background: #f8faf7;
  border: 1px solid var(--line);
  border-radius: 15px;
}
.subservice.disabled { opacity: .55; }
.subservice-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 13px;
}
.subservice-head strong { font-size: 15px; }
.subservice-charge { color: var(--forest-800); font-weight: 820; }

.application-list { display: grid; gap: 9px; }
.application-row {
  padding: 13px;
  background: #f8faf7;
  border: 1px solid var(--line);
  border-radius: 14px;
}
.application-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.application-bottom {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(105px, .7fr);
  gap: 10px;
  margin-top: 12px;
}
.application-bottom .field { margin: 0; }
.output-box {
  display: flex;
  min-height: 50px;
  align-items: center;
  justify-content: flex-end;
  padding: 12px 14px;
  color: var(--forest-800);
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 13px;
  font-weight: 820;
  font-variant-numeric: tabular-nums;
}

.inline-summary {
  display: grid;
  gap: 8px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.summary-line { display: flex; justify-content: space-between; gap: 15px; color: var(--muted); font-size: 13px; }
.summary-line strong { color: var(--ink); }
.summary-line.total { padding-top: 9px; color: var(--ink); border-top: 1px dashed var(--line-strong); font-size: 15px; }
.summary-line.total strong { color: var(--forest-800); font-size: 17px; }

.empty-state {
  padding: 38px 24px;
  text-align: center;
  background: rgba(255,255,255,.75);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
}
.empty-state svg { width: 44px; height: 44px; color: #90a196; }
.empty-state h2 { margin: 12px 0 5px; font-size: 19px; }
.empty-state p { margin: 0; color: var(--muted); }

.notice {
  padding: 14px 15px;
  color: var(--warning);
  background: #fff8dd;
  border: 1px solid #ead995;
  border-radius: 14px;
  font-size: 13px;
}
.sync-card {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr);
  gap: 13px;
  align-items: start;
  padding: 16px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 16px;
}
.sync-icon { display: grid; width: 44px; height: 44px; place-items: center; color: var(--forest-700); background: var(--green-100); border-radius: 13px; }
.sync-card h3 { margin: 0; font-size: 16px; }
.sync-card p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

.bottom-nav {
  position: fixed;
  right: 0;
  bottom: 0;
  left: 0;
  z-index: 60;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 7px 8px max(7px, env(safe-area-inset-bottom));
  background: rgba(255,255,255,.96);
  border-top: 1px solid var(--line);
  box-shadow: 0 -9px 24px rgba(16,56,34,.08);
  backdrop-filter: blur(16px);
}
.nav-btn {
  display: grid;
  min-height: 55px;
  padding: 6px 4px;
  place-items: center;
  align-content: center;
  gap: 3px;
  color: #758078;
  background: transparent;
  border: 0;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 750;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--forest-800); background: var(--green-100); }

.sticky-total {
  position: fixed;
  right: 12px;
  bottom: calc(75px + env(safe-area-inset-bottom));
  left: 12px;
  z-index: 55;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  width: min(calc(100% - 24px), calc(var(--content-width) - 24px));
  margin: 0 auto;
  padding: 13px 15px;
  color: white;
  background: linear-gradient(135deg, var(--forest-900), var(--forest-700));
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 17px;
  box-shadow: 0 13px 28px rgba(5,49,28,.26);
}
.sticky-total span { display: block; color: rgba(255,255,255,.68); font-size: 10px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
.sticky-total strong { display: block; margin-top: 1px; font-size: 21px; letter-spacing: -.03em; }
.sticky-total button {
  min-height: 42px;
  padding: 9px 14px;
  color: var(--forest-950);
  background: var(--lime);
  border: 0;
  border-radius: 12px;
  font-weight: 850;
}

.toast {
  position: fixed;
  right: 16px;
  bottom: calc(92px + env(safe-area-inset-bottom));
  left: 16px;
  z-index: 100;
  max-width: 480px;
  margin: auto;
  padding: 13px 16px;
  color: white;
  text-align: center;
  background: rgba(20,33,25,.96);
  border-radius: 13px;
  box-shadow: 0 12px 28px rgba(0,0,0,.2);
  opacity: 0;
  transform: translateY(16px);
  pointer-events: none;
  transition: .2s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

@media (max-width: 480px) {
  .field-grid.two { grid-template-columns: 1fr; }
  .application-bottom { grid-template-columns: 1fr 1fr; }
  .button-row.stack-small { display: grid; }
}

@media (min-width: 900px) {
  body { background: #f4f6f3; }
  .app-content { min-width: 0; }
  .sticky-total { display: none; }
  .app-shell { display: grid; grid-template-columns: 230px minmax(0, 1fr); }
  .desktop-sidebar {
    position: sticky;
    top: 0;
    display: flex;
    min-height: 100vh;
    height: 100vh;
    flex-direction: column;
    padding: 24px 18px;
    color: white;
    background: linear-gradient(165deg, var(--forest-950), var(--forest-800));
  }
  .desktop-brand { display: flex; align-items: center; gap: 11px; margin-bottom: 32px; }
  .desktop-brand img { width: 50px; height: 42px; object-fit: contain; padding: 4px; background: #fff; border-radius: 11px; }
  .desktop-brand strong { display: block; font-size: 19px; }
  .desktop-brand small { color: rgba(255,255,255,.65); }
  .desktop-nav { display: grid; gap: 7px; }
  .desktop-nav button {
    display: flex;
    min-height: 48px;
    align-items: center;
    gap: 12px;
    padding: 11px 13px;
    color: rgba(255,255,255,.72);
    background: transparent;
    border: 0;
    border-radius: 12px;
    font-weight: 720;
    text-align: left;
  }
  .desktop-nav button.active { color: white; background: rgba(255,255,255,.12); }
  .desktop-nav svg { width: 21px; height: 21px; }
  .desktop-sync { margin-top: auto; padding: 14px; color: rgba(255,255,255,.72); background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.11); border-radius: 14px; font-size: 12px; }
  .desktop-sync strong { display: block; color: #fff; margin-bottom: 4px; }
  .mobile-header, .bottom-nav { display: none; }
  .app-main {
    width: min(100%, 1080px);
    min-height: 100vh;
    padding: 34px 36px 80px;
  }
  .app-main.wide { width: min(100%, 1200px); }
  .sticky-total {
    position: sticky;
    right: auto;
    bottom: 18px;
    left: auto;
    width: 100%;
    margin-top: 18px;
  }
  .desktop-editor-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 18px;
    align-items: start;
  }
  .desktop-summary { position: sticky; top: 24px; }

<body><div id="app" class="app-shell" aria-live="polite"></div><div id="toast" class="toast" role="status" aria-live="polite"></div><script>const CREW_RATES = Object.freeze({ one: 75, two: 120 });

function numberValue(value) {
  const parsed = Number.parseFloat(value);
  return Number.isFinite(parsed) ? parsed : 0;
}

function defaultEstimate(overrides = {}) {
  const year = new Date().getFullYear() + 1;
  return {
    id: null,
    estimateNumber: '',
    estimateName: '',
    siteAddress: '',
    squareFootage: '',
    season: `Summer ${year}`,
    preparedBy: '',

    crewType: 'two',
    crewRate: 120,
    weeklyEnabled: false,
    weeklyTime: '',
    weeklyVisits: 22,
    gardensEnabled: false,
    gardensTime: '',
    gardensVisits: 10,
    clippingsEnabled: false,
    clippingsFee: 50,

    fertSpringEnabled: false,
    fertSummerEnabled: false,
    fertFallEnabled: false,
    fertSpringRate: 0.012,
    fertSummerRate: 0.012,
    fertFallRate: 0.012,
    limeSpringEnabled: false,
    limeSummerEnabled: false,
    limeFallEnabled: false,
    limeSpringRate: 0.015,
    limeSummerRate: 0.015,
    limeFallRate: 0.015,
    fertLabourTime: '',
    fertLabourRate: 75,

    springCleanupEnabled: false,
    springCleanupTime: '',
    springCleanupRate: 180,
    springDisposalEnabled: true,
    springDisposalFee: 50,
    fallCleanupEnabled: false,
    fallCleanupTime: '',
    fallCleanupRate: 180,
    fallDisposalEnabled: true,
    fallDisposalFee: 50,

    mulchEnabled: false,
    mulchYards: '',
    mulchRate: 83.75,
    springAerationEnabled: false,
    springAerationRate: 0.02,
    springAerationDeliveryEnabled: true,
    springAerationDeliveryFee: 75,
    fallAerationEnabled: false,
    fallAerationRate: 0.02,
    fallAerationDeliveryEnabled: true,
    fallAerationDeliveryFee: 75,

    litterEnabled: false,
    litterTime: '',
    litterVisits: '',
    litterRate: 75,
    litterDisposalFee: 50,

    createdAt: null,
    updatedAt: null,
    ...overrides,
  };
}

function calculateEstimate(values) {
  const v = values || {};
  const n = (key) => numberValue(v[key]);
  const c = (key) => Boolean(v[key]);
  const sqft = n('squareFootage');
  const crewRate = n('crewRate');

  const weeklyHours = c('weeklyEnabled') ? n('weeklyTime') * n('weeklyVisits') : 0;
  const weeklyCharge = weeklyHours * crewRate;
  const gardensHours = c('gardensEnabled') ? n('gardensTime') * n('gardensVisits') : 0;
  const gardensCharge = gardensHours * crewRate;
  const clippingsCharge = c('clippingsEnabled') ? n('clippingsFee') : 0;
  const lawnTotal = weeklyCharge + gardensCharge + clippingsCharge;

  const applicationRows = [
    ['fertSpringEnabled', 'fertSpringRate', 'Fertilizer · Spring'],
    ['fertSummerEnabled', 'fertSummerRate', 'Fertilizer · Summer'],
    ['fertFallEnabled', 'fertFallRate', 'Fertilizer · Fall'],
    ['limeSpringEnabled', 'limeSpringRate', 'Lime · Spring'],
    ['limeSummerEnabled', 'limeSummerRate', 'Lime · Summer'],
    ['limeFallEnabled', 'limeFallRate', 'Lime · Fall'],
  ];
  const applicationCharges = applicationRows.map(([enabledKey, rateKey, label]) => ({
    enabled: c(enabledKey),
    label,
    charge: c(enabledKey) ? sqft * n(rateKey) : 0,
  }));
  const applicationCount = applicationCharges.filter((item) => item.enabled).length;
  const fertLabourCharge = n('fertLabourTime') * applicationCount * n('fertLabourRate');
  const fertilizerMaterialTotal = applicationCharges.reduce((sum, item) => sum + item.charge, 0);
  const fertTotal = fertilizerMaterialTotal + fertLabourCharge;

  const springCleanupCharge = c('springCleanupEnabled')
    ? n('springCleanupTime') * n('springCleanupRate') + (c('springDisposalEnabled') ? n('springDisposalFee') : 0)
    : 0;
  const fallCleanupCharge = c('fallCleanupEnabled')
    ? n('fallCleanupTime') * n('fallCleanupRate') + (c('fallDisposalEnabled') ? n('fallDisposalFee') : 0)
    : 0;
  const cleanupTotal = springCleanupCharge + fallCleanupCharge;

  const mulchCharge = c('mulchEnabled') ? n('mulchYards') * n('mulchRate') : 0;
  const springAerationCharge = c('springAerationEnabled')
    ? sqft * n('springAerationRate') + (c('springAerationDeliveryEnabled') ? n('springAerationDeliveryFee') : 0)
    : 0;
  const fallAerationCharge = c('fallAerationEnabled')
    ? sqft * n('fallAerationRate') + (c('fallAerationDeliveryEnabled') ? n('fallAerationDeliveryFee') : 0)
    : 0;
  const maintenanceTotal = mulchCharge + springAerationCharge + fallAerationCharge;

  const litterCharge = c('litterEnabled')
    ? (n('litterTime') * n('litterRate') + n('litterDisposalFee')) * n('litterVisits')
    : 0;

  const grandTotal = lawnTotal + fertTotal + cleanupTotal + maintenanceTotal + litterCharge;

  return {
    sqft,
    crewRate,
    weeklyHours,
    weeklyCharge,
    gardensHours,
    gardensCharge,
    clippingsCharge,
    lawnTotal,
    applicationCharges,
    applicationCount,
    fertilizerMaterialTotal,
    fertLabourCharge,
    fertTotal,
    springCleanupCharge,
    fallCleanupCharge,
    cleanupTotal,
    mulchCharge,
    springAerationCharge,
    fallAerationCharge,
    maintenanceTotal,
    litterCharge,
    grandTotal,
  };
}

function sectionSummaries(values) {
  const totals = calculateEstimate(values);
  return [
    {
      id: 'lawn',
      number: 1,
      title: 'Lawn Maintenance',
      total: totals.lawnTotal,
      enabledCount: ['weeklyEnabled', 'gardensEnabled', 'clippingsEnabled'].filter((key) => values[key]).length,
      description: 'Mowing, garden visits and clipping disposal',
    },
    {
      id: 'fertilizer',
      number: 2,
      title: 'Fertilization & Lime',
      total: totals.fertTotal,
      enabledCount: totals.applicationCount,
      description: 'Seasonal applications and application labour',
    },
    {
      id: 'cleanup',
      number: 3,
      title: 'Spring / Fall Clean Up',
      total: totals.cleanupTotal,
      enabledCount: ['springCleanupEnabled', 'fallCleanupEnabled'].filter((key) => values[key]).length,
      description: 'Cleanup time, crew rates and disposal',
    },
    {
      id: 'maintenance',
      number: 4,
      title: 'Mulch & Aeration',
      total: totals.maintenanceTotal,
      enabledCount: ['mulchEnabled', 'springAerationEnabled', 'fallAerationEnabled'].filter((key) => values[key]).length,
      description: 'Mulch quantities and seasonal aeration',
    },
    {
      id: 'litter',
      number: 5,
      title: 'Litter Pickup',
      total: totals.litterCharge,
      enabledCount: values.litterEnabled ? 1 : 0,
      description: 'Visit time, frequency and disposal',
    },
  ];
}

function formatMoney(value) {
  return new Intl.NumberFormat('en-CA', {
    style: 'currency',
    currency: 'CAD',
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  }).format(Number.isFinite(Number(value)) ? Number(value) : 0);
}

function formatNumber(value, decimals = 0) {
  return Number(value || 0).toLocaleString('en-CA', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}

const ESTIMATES_KEY = 'summer-estimate-app-estimates-v2';
const DRAFT_KEY = 'summer-estimate-app-draft-v2';
const PREFS_KEY = 'summer-estimate-app-preferences-v2';

function parseJson(value, fallback) {
  try {
    const parsed = JSON.parse(value);
    return parsed ?? fallback;
  } catch {
    return fallback;
  }
}

const localStore = {
  listEstimates() {
    const items = parseJson(localStorage.getItem(ESTIMATES_KEY), []);
    return Array.isArray(items) ? items : [];
  },

  saveEstimates(items) {
    localStorage.setItem(ESTIMATES_KEY, JSON.stringify(items));
  },

  getDraft() {
    return parseJson(localStorage.getItem(DRAFT_KEY), null);
  },

  saveDraft(draft) {
    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
  },

  clearDraft() {
    localStorage.removeItem(DRAFT_KEY);
  },

  getPreferences() {
    return parseJson(localStorage.getItem(PREFS_KEY), {});
  },

  savePreferences(preferences) {
    localStorage.setItem(PREFS_KEY, JSON.stringify(preferences));
  },
};

function makeId() {
  return globalThis.crypto?.randomUUID?.() || `${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

const RATE_KEYS = [
  'fertSpringRate', 'fertSummerRate', 'fertFallRate',
  'limeSpringRate', 'limeSummerRate', 'limeFallRate',
  'fertLabourRate', 'springCleanupRate', 'fallCleanupRate',
  'mulchRate', 'springAerationRate', 'fallAerationRate',
  'litterRate', 'clippingsFee', 'springDisposalFee', 'fallDisposalFee',
  'springAerationDeliveryFee', 'fallAerationDeliveryFee', 'litterDisposalFee',
];

const app = document.getElementById('app');
const toast = document.getElementById('toast');
let toastTimer = null;

const state = {
  route: 'home',
  activeSection: null,
  savedSearch: '',
  current: restoreDraft(),
  lastSavedSnapshot: '',
};

function restoreDraft() {
  const draft = localStore.getDraft();
  if (draft && typeof draft === 'object') return defaultEstimate(draft);
  return newEstimateFromPreferences();
}

function newEstimateFromPreferences() {
  const prefs = localStore.getPreferences();
  return defaultEstimate({
    ...prefs,
    crewType: 'two',
    crewRate: Number(prefs.twoPersonRate ?? CREW_RATES.two),
  });
}

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function safeText(value) {
  return String(value ?? '').replace(/[&<>'"]/g, (char) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;',
  }[char]));
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

function renderProjectForm() {
  return `

function setRoute(route) {
  if (route === 'estimate' && !state.current) state.current = newEstimateFromPreferences();
  state.route = route;
  state.activeSection = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function openSection(section) {
  state.activeSection = section;
  state.route = 'section';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function startNewEstimate() {
  if (hasDraftData() && !confirm('Start a new estimate? The current draft will be replaced.')) return;
  state.current = newEstimateFromPreferences();
  state.lastSavedSnapshot = '';
  localStore.saveDraft(state.current);
  setRoute('project');
}

function generateEstimateNumber(items) {
  const year = new Date().getFullYear();
  const sequence = items.reduce((max, item) => {
    const match = String(item.estimateNumber || '').match(/(\d+)$/);
    return Math.max(max, match ? Number(match[1]) : 0);
  }, 0) + 1;
  return `EST-${year}-${String(sequence).padStart(4, '0')}`;
}

function saveCurrent() {
  if (!state.current.estimateName.trim() && !state.current.siteAddress.trim()) {
    showToast('Add an estimate name or address before saving.');
    state.route = 'project';
    state.activeSection = null;
    render();
    return;
  }
  const items = savedEstimates();
  const now = new Date().toISOString();
  if (!state.current.id) {
    state.current.id = makeId();
    state.current.estimateNumber = generateEstimateNumber(items);
    state.current.createdAt = now;
  }
  state.current.updatedAt = now;
  const total = calculateEstimate(state.current).grandTotal;
  const item = { ...clone(state.current), total };
  const existingIndex = items.findIndex((entry) => entry.id === item.id);
  if (existingIndex >= 0) items[existingIndex] = item;
  else items.unshift(item);
  localStore.saveEstimates(items);
  localStore.saveDraft(state.current);
  state.lastSavedSnapshot = JSON.stringify(state.current);
  showToast(`Saved ${state.current.estimateName || state.current.siteAddress}.`);
  refreshVisibleTotals();
}

function openSaved(id) {
  const item = savedEstimates().find((entry) => entry.id === id);
  if (!item) return;
  state.current = defaultEstimate(item);
  localStore.saveDraft(state.current);
  state.lastSavedSnapshot = JSON.stringify(state.current);
  setRoute('estimate');
  showToast(`Opened ${item.estimateName || item.siteAddress}.`);
}

function duplicateEstimate(item = state.current) {
  const copy = defaultEstimate(clone(item));
  copy.id = null;
  copy.estimateNumber = '';
  copy.estimateName = `${copy.estimateName || copy.siteAddress || 'Estimate'} - Copy`;
  copy.createdAt = null;
  copy.updatedAt = new Date().toISOString();
  state.current = copy;
  state.lastSavedSnapshot = '';
  localStore.saveDraft(copy);
  setRoute('estimate');
  showToast('Duplicate created. Save it when ready.');
}

function deleteSaved(id) {
  const items = savedEstimates();
  const item = items.find((entry) => entry.id === id);
  if (!item || !confirm(`Delete “${item.estimateName || item.siteAddress}”?`)) return;
  localStore.saveEstimates(items.filter((entry) => entry.id !== id));
  if (state.current.id === id) {
    state.current = newEstimateFromPreferences();
    localStore.saveDraft(state.current);
  }
  render();
  showToast('Estimate deleted.');
}

    refreshVisibleTotals();
  }
  if (element.matches('[data-search="saved"]')) {
    state.savedSearch = element.value;
    const container = document.getElementById('saved-list-container');
    const items = filterSaved();
    if (container) container.innerHTML = items.length ? `<div class="estimate-list">${items.map(renderEstimateCard).join('')}</div>` : renderEmpty('No matches found', 'Try another search.');
  }
});

app.addEventListener('change', (event) => {
  const element = event.target;
  if (element.matches('[data-field]')) {
    updateFieldFromElement(element);
    if (element.type === 'checkbox') render();
    else refreshVisibleTotals();
  }
  if (element.matches('[data-preference]')) savePreferenceField(element);
});

app.addEventListener('click', (event) => {
  const routeButton = event.target.closest('[data-route]');
  if (routeButton) {
    setRoute(routeButton.dataset.route);
    return;
  }
  const actionButton = event.target.closest('[data-action]');
  if (!actionButton) return;
  const action = actionButton.dataset.action;
  if (action === 'new-estimate') startNewEstimate();
  if (action === 'go-saved') setRoute('saved');
  if (action === 'back-to-estimate') setRoute('estimate');
  if (action === 'edit-project') setRoute('project');
  if (action === 'open-section') openSection(actionButton.dataset.section);
  if (action === 'save') saveCurrent();
  if (action === 'open-estimate') openSaved(actionButton.dataset.id);
  if (action === 'duplicate-saved') {
    const item = savedEstimates().find((entry) => entry.id === actionButton.dataset.id);
    if (item) duplicateEstimate(item);
  }
  if (action === 'delete-saved') deleteSaved(actionButton.dataset.id);
  if (action === 'duplicate-current') duplicateEstimate();
  if (action === 'print') printEstimate();
  if (action === 'load-example') loadExample();
  if (action === 'clear-draft') {
    if (confirm('Clear the current draft? Saved estimates will not be deleted.')) {
      state.current = newEstimateFromPreferences();
      localStore.saveDraft(state.current);
      showToast('Current draft cleared.');
      render();
    }
  }
  if (action === 'use-current-rates') useCurrentRatesAsDefaults();
  if (action === 'set-crew') {
    state.current.crewType = actionButton.dataset.value;
    const prefs = localStore.getPreferences();
    state.current.crewRate = actionButton.dataset.value === 'one'
      ? Number(prefs.onePersonRate ?? CREW_RATES.one)
      : Number(prefs.twoPersonRate ?? CREW_RATES.two);
    localStore.saveDraft(state.current);
    render();
  }
});

window.addEventListener('beforeunload', () => localStore.saveDraft(state.current));

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((error) => console.warn('Service worker registration failed', error));
  });
}

render();

// Exposed for quick automated verification in a browser console.
window.SummerEstimateApp = {
  calculateEstimate,
  getCurrentEstimate: () => clone(state.current),
  getSavedEstimates: savedEstimates,
};
</script></body></html>
